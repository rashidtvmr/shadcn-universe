    // ============================================
    // PROXMOX HELPERS STYLE (glass effect)
    // ============================================

    function ProxmoxNav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handler = () => setScrolled(window.scrollY > 0);
        window.addEventListener('scroll', handler);
        return () => window.removeEventListener('scroll', handler);
      }, []);
      return (
        <div className={`fixed left-0 top-0 z-50 flex w-full justify-center px-4 ${scrolled ? 'glass border-b bg-white/50' : ''}`}>
          <div className="flex h-16 w-full max-w-7xl items-center justify-between">
            <a href="/" className="flex items-center gap-2 font-semibold">
              <div className="h-4 w-4 rounded bg-blue-500"></div>
              <span className="hidden lg:block">Proxmox Helper</span>
            </a>
            <div className="flex gap-2">
              <button className="p-2 hover:bg-gray-100 rounded"><Search size={18} /></button>
              <button className="p-2 hover:bg-gray-100 rounded"><Github size={18} /></button>
              <button className="p-2 hover:bg-gray-100 rounded"><ExternalLink size={18} /></button>
              <button className="p-2 hover:bg-gray-100 rounded"><Sun size={18} /></button>
            </div>
          </div>
        </div>
      );
    }
